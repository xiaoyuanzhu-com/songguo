<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Songguo">
  <defs>
    <linearGradient id="sg-cone" gradientUnits="userSpaceOnUse" x1="32" y1="6" x2="32" y2="62">
      <stop offset="0" stop-color="#63B083"/>
      <stop offset="1" stop-color="#2C6A41"/>
    </linearGradient>
  </defs>

  <!-- twig + two pine needles -->
  <g fill="none" stroke-linecap="round">
    <path d="M32 13 L32 6" stroke="#3F8F5B" stroke-width="2.4"/>
    <path d="M32 8 L26.5 3.5" stroke="#7CC79A" stroke-width="2"/>
    <path d="M32 8 L37.5 3.5" stroke="#7CC79A" stroke-width="2"/>
  </g>

  <!-- pinecone scales, drawn bottom rows first so upper scales overlap downward -->
  <g fill="url(#sg-cone)" stroke="#234f33" stroke-width="1.1" stroke-linejoin="round">
    <rect x="-7" y="-7" width="14" height="14" rx="4.6" transform="translate(32,53) rotate(45)"/>

    <rect x="-7" y="-7" width="14" height="14" rx="4.6" transform="translate(25,44) rotate(45)"/>
    <rect x="-7" y="-7" width="14" height="14" rx="4.6" transform="translate(39,44) rotate(45)"/>

    <rect x="-7" y="-7" width="14" height="14" rx="4.6" transform="translate(18,35) rotate(45)"/>
    <rect x="-7" y="-7" width="14" height="14" rx="4.6" transform="translate(32,35) rotate(45)"/>
    <rect x="-7" y="-7" width="14" height="14" rx="4.6" transform="translate(46,35) rotate(45)"/>

    <rect x="-7" y="-7" width="14" height="14" rx="4.6" transform="translate(18,26) rotate(45)"/>
    <rect x="-7" y="-7" width="14" height="14" rx="4.6" transform="translate(32,26) rotate(45)"/>
    <rect x="-7" y="-7" width="14" height="14" rx="4.6" transform="translate(46,26) rotate(45)"/>

    <rect x="-7" y="-7" width="14" height="14" rx="4.6" transform="translate(25,17) rotate(45)"/>
    <rect x="-7" y="-7" width="14" height="14" rx="4.6" transform="translate(39,17) rotate(45)"/>
  </g>
</svg>
