# Songguo configuration — vendors are file-based and hot-reloaded.
# Tokens (consumer API keys + budgets) are NOT here; they live in SQLite and are managed via the dashboard.
# The admin key for the dashboard/admin API comes from the SONGGUO_ADMIN_KEY env var, never this file.
#
# Two routing modes share one transparent proxy:
#
#   Model-routed  /v1/...           — point any OpenAI-compatible SDK at http://<songguo>/v1.
#                                      The model is read from the body and routed across every
#                                      vendor that serves it. base_url is the vendor's PUBLISHED
#                                      OpenAI-compatible base, INCLUDING any version/path prefix:
#                                        OpenAI    https://api.openai.com/v1
#                                        Ark/方舟   https://ark.cn-beijing.volces.com/api/v3
#                                        DashScope https://dashscope.aliyuncs.com/compatible-mode/v1
#                                        DeepSeek  https://api.deepseek.com
#                                      The upstream URL is base_url + (request path minus /v1), so
#                                      /v1/chat/completions reaches …/api/v3/chat/completions on Ark.
#
#   Passthrough   /x/<vendor>/...    — address one vendor by name and forward the rest of the path
#                                      to its HOST (base_url's scheme://host, path stripped). No
#                                      model is required, so native APIs, rerank, and async
#                                      submit→poll calls (e.g. GET /x/bailian/api/v1/tasks/{id})
#                                      all work. Failover here is across that vendor's own
#                                      credentials only.

settings:
  listen: ":8080"          # overridden by SONGGUO_LISTEN if set

vendors:
  - name: openai-main
    base_url: https://api.openai.com/v1   # vendor's OpenAI-compatible base (includes /v1)
    served_models: [gpt-4o, gpt-4o-mini, text-embedding-3-small]
    priority: 1            # lower = preferred
    weight: 1              # weighted round-robin within the same priority
    credentials:           # the 号池 (key pool) — rotated to spread per-key rate limits
      - id: openai-key-1
        api_key: sk-REPLACE_ME
    prices:                # per-model true cost, used for metering + cheapest-route
      gpt-4o:                  { input: 2.50, output: 10.00, unit: per_1m_tokens }
      gpt-4o-mini:            { input: 0.15, output: 0.60,  unit: per_1m_tokens }
      text-embedding-3-small: { input: 0.02,                unit: per_1m_tokens }

  - name: deepseek
    base_url: https://api.deepseek.com
    served_models: [deepseek-chat]
    priority: 2
    credentials:
      - id: deepseek-key-1
        api_key: sk-REPLACE_ME
    prices:
      deepseek-chat: { input: 0.27, output: 1.10, unit: per_1m_tokens }

  # 火山方舟 / Ark — OpenAI-compatible base is …/api/v3, so /v1/chat/completions
  # is routed to https://ark.cn-beijing.volces.com/api/v3/chat/completions.
  # - name: ark
  #   base_url: https://ark.cn-beijing.volces.com/api/v3
  #   served_models: [doubao-pro-32k]
  #   priority: 1
  #   credentials:
  #     - id: ark-key-1
  #       api_key: REPLACE_ME
  #   prices:
  #     doubao-pro-32k: { input: 0.80, output: 2.00, unit: per_1m_tokens }

  # 阿里百炼 / DashScope (Bailian) — OpenAI-compatible base is /compatible-mode/v1.
  # Use model-routed /v1/... for chat; use /x/bailian/... to reach native endpoints
  # (e.g. /x/bailian/api/v1/services/aigc/.../generation) and async task polls
  # (/x/bailian/api/v1/tasks/{id}), which are forwarded to the host origin.
  # - name: bailian
  #   base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
  #   served_models: [qwen-plus]
  #   priority: 1
  #   credentials:
  #     - id: bailian-key-1
  #       api_key: sk-REPLACE_ME
  #   prices:
  #     qwen-plus: { input: 0.40, output: 1.20, unit: per_1m_tokens }
